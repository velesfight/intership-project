---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nude-web-v2
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nude-web-v2
  template:
    metadata:
      labels:
        app: nude-web-v2
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: nude-web-v2
          image: nexus.ghfls.ru/docker-hosted/nude-web-v2:__TAG__
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nude-web-v2
  namespace: dev
spec:
  selector:
    app: nude-web-v2
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nude-web-v2-ingress
  namespace: dev
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - dev.app.nude.web-sgfbefef-v2.ghfls.ru
      secretName: dev-app-nude-web-sgfbefef-v2-ghfls-ruru-tls
  rules:
    - host: dev.app.nude.web-sgfbefef-v2.ghfls.ru
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nude-web-v2
                port:
                  number: 80
